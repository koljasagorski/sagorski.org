    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
      overflow: hidden;
      font-family: "Source Sans 3", system-ui, sans-serif;
    }

    /* ─── LEFT PANEL ─────────────────────────── */

    .panel-light {
      background: #FFFFFF;
      color: #111111;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 5rem 4rem;
      border-right: 1px solid rgba(0, 0, 0, 0.1);
      position: relative;
    }

    /* Name / headline */
    .headline {
      font-size: clamp(3rem, 5vw, 5.5rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
      position: relative;
    }

    .name-line { display: block; }

    /* Terminal typing animation */
    .headline-email {
      display: block;
      text-decoration: none;
      color: inherit;
      position: relative;
    }

    .email-text {
      display: block;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .headline-email:hover .email-text {
      opacity: 0;
      transform: translateY(-10px);
    }

    .terminal-box {
      position: absolute;
      top: calc(100% + 1rem);
      left: 0;
      font-family: "Courier New", monospace;
      font-size: 0.8rem;
      color: #111;
      white-space: pre;
      opacity: 0;
      pointer-events: none;
      z-index: 10;
      line-height: 1.6;
    }

    .headline-email:hover .terminal-box {
      opacity: 1;
    }

    .terminal-box.is-typing::after {
      content: "";
      display: inline-block;
      width: 6px;
      height: 1em;
      margin-left: 3px;
      background: #111;
      animation: blink 0.6s infinite;
      vertical-align: bottom;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      50.01%, 100% { opacity: 0; }
    }

    /* Subtitle */
    .subtitle {
      font-size: 0.9rem;
      font-weight: 400;
      color: #888888;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 3rem;
    }

    /* Nav links */
    .nav-links {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
      align-self: flex-start;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 0;
      border: none;
      border-bottom: 1px solid #e0e0e0;
      background: transparent;
      color: #111;
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      transition: border-color 0.2s ease, gap 0.2s ease, color 0.2s ease;
      width: 100%;
    }

    .btn:hover {
      border-bottom-color: #111;
      gap: 0.85rem;
      color: #000;
    }

    .btn svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
      opacity: 0.7;
      transition: opacity 0.2s ease;
    }

    .btn:hover svg { opacity: 1; }

    .btn-arrow {
      margin-left: auto;
      font-size: 0.75rem;
      opacity: 0;
      transform: translateX(-4px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .btn:hover .btn-arrow {
      opacity: 0.5;
      transform: translateX(0);
    }

    /* ─── RIGHT PANEL ────────────────────────── */

    .panel-dark {
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 5rem 4rem;
      color: #FFFFFF;
    }

    /* Video fills the dark panel */
    .panel-dark video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    /* Overlay for readability */
    .panel-dark::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 1;
    }

    .dark-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
    }

    /* Profile image in dark panel */
    .profile-image-wrapper {
      width: 180px;
      height: 180px;
      position: relative;
      overflow: hidden;
      cursor: default;
    }

    .profile-image-main,
    .profile-image-alt {
      width: 100%;
      height: 100%;
      border-radius: 0;
      object-fit: cover;
      position: absolute;
      top: 0;
      left: 0;
      transition: transform 0.35s ease-out, opacity 0.35s ease-out;
    }

    .profile-image-main { transform: translateX(0); opacity: 1; }
    .profile-image-alt  { transform: translateX(100%); opacity: 0; }

    .profile-image-wrapper:hover .profile-image-main {
      transform: translateX(-100%);
      opacity: 0;
    }

    .profile-image-wrapper:hover .profile-image-alt {
      transform: translateX(0);
      opacity: 1;
    }

    /* PGP block */
    .pgp {

    /* ─── MOBILE ─────────────────────────────── */

      .headline-email:hover .terminal-box {
        transform: none !important;
        opacity: 1 !important;
      }
    }

  <script>
    /* Terminal typing animation on name hover */
    (function () {
      const link = document.querySelector('.headline-email');
      const box = document.getElementById('terminal-box');
      if (!link || !box) return;

      const lines = [
        '$ connect smtp.sagorski.org',
        '$ sendmail kolja@sagorski.org',
        '$ mail sent ✓'
      ];

      let timeouts = [];

      function clearAllTimeouts() {
        timeouts.forEach(id => clearTimeout(id));
        timeouts = [];
      }

      function startTyping() {
        clearAllTimeouts();
        box.textContent = '';
        box.classList.add('is-typing');

        let fullText = '';
        let delay = 0;
        const charDelay = 40;

        lines.forEach((line, index) => {
          delay += index === 0 ? 0 : 250;

          for (let i = 0; i <= line.length; i++) {
            const currentDelay = delay;
            const part = line.slice(0, i);
            const id = setTimeout(() => {
              box.textContent = fullText + part;
            }, currentDelay);
            timeouts.push(id);
            delay += charDelay;
          }

          const finalizeId = setTimeout(() => {
            fullText += line + (index < lines.length - 1 ? '\n' : '');
            box.textContent = fullText;
          }, delay);
          timeouts.push(finalizeId);
        });

        const endId = setTimeout(() => {
          box.classList.remove('is-typing');
        }, delay + 300);
        timeouts.push(endId);
      }

      function resetTyping() {
        clearAllTimeouts();
        box.textContent = '';
        box.classList.remove('is-typing');
      }

      link.addEventListener('mouseenter', startTyping);
      link.addEventListener('mouseleave', resetTyping);
    })();
  </script>
