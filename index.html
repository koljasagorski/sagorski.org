  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
      overflow: hidden;
      font-family: "Source Sans 3", system-ui, sans-serif;
      transition: grid-template-columns 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Panel hover expansion — left expands when left is hovered, right when right */
    @media (hover: hover) {
      body:has(.panel-light:hover) { grid-template-columns: 58fr 42fr; }
      body:has(.panel-dark:hover)  { grid-template-columns: 42fr 58fr; }
    }

    /* ─── LEFT PANEL ─────────────────────────── */

    .panel-light {
      background: #FFFFFF;
      color: #111111;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 5rem 4rem;
      position: relative;
    }

    /* Divider: static line + slow scanning glow */
    .panel-light::after {
      content: "";
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 1px;
      background: rgba(0, 0, 0, 0.08);
      z-index: 10;
    }

    .panel-light::before {
      content: "";
      position: absolute;
      right: -0.5px;
      width: 1px;
      height: 30vh;
      background: linear-gradient(to bottom, transparent, rgba(0, 255, 65, 0.55), transparent);
      z-index: 11;
      animation: divider-scan 9s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes divider-scan {
      0%, 100% { top: -30vh; }
      50%       { top: 100vh; }
    }

    /* Name / headline */
    .headline {
      font-size: clamp(3rem, 5vw, 5.5rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.025em;
      margin-bottom: 1.25rem;
      position: relative;
    }

    .name-line { display: block; }

    /* Terminal typing animation */
    .headline-email {
      display: block;
      text-decoration: none;
      color: inherit;
      position: relative;
    }

    .email-text {
      display: block;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .headline-email:hover .email-text {
      opacity: 0;
      transform: translateY(-10px);
    }

    .terminal-box {
      position: absolute;
      top: calc(100% + 1rem);
      left: 0;
      font-family: "Courier New", monospace;
      font-size: 0.8rem;
      color: #333;
      white-space: pre;
      opacity: 0;
      pointer-events: none;
      z-index: 10;
      line-height: 1.7;
    }

    .headline-email:hover .terminal-box { opacity: 1; }

    .terminal-box.is-typing::after {
      content: "";
      display: inline-block;
      width: 6px;
      height: 1em;
      margin-left: 3px;
      background: #333;
      animation: blink 0.6s infinite;
      vertical-align: bottom;
    }

    @keyframes blink {
      0%, 50%      { opacity: 1; }
      50.01%, 100% { opacity: 0; }
    }

    /* Rule + Subtitle */
    .name-rule {
      border: none;
      border-top: 1px solid #e8e8e8;
      margin: 1.25rem 0;
    }

    .subtitle {
      font-size: 0.85rem;
      font-weight: 400;
      color: #999999;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 3rem;
    }

    /* Nav links */
    .nav-links {
      display: flex;
      flex-direction: column;
      gap: 0;
      align-self: flex-start;
      width: 100%;
      max-width: 280px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.7rem 0;
      border: none;
      border-bottom: 1px solid #ebebeb;
      background: transparent;
      color: #333;
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      transition: color 0.2s ease, border-color 0.2s ease, padding-left 0.25s ease;
    }

    .btn:first-child { border-top: 1px solid #ebebeb; }

    .btn:hover {
      color: #000;
      border-bottom-color: #bbb;
      padding-left: 0.5rem;
    }

    .btn svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      opacity: 0.5;
      transition: opacity 0.2s ease;
    }

    .btn:hover svg { opacity: 0.85; }

    .btn-arrow {
      margin-left: auto;
      font-size: 0.7rem;
      color: #bbb;
      opacity: 0;
      transform: translateX(-6px);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .btn:hover .btn-arrow {
      opacity: 1;
      transform: translateX(0);
    }

    /* ─── RIGHT PANEL ────────────────────────── */

    .panel-dark {
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      color: #FFFFFF;
    }

    /* Video fills the dark panel */
    .panel-dark video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    /* Darkening overlay */
    .panel-dark::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1;
    }

    /* Content fills panel, image top / PGP bottom */
    .dark-content {
      position: relative;
      z-index: 2;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 4rem;
    }

    /* Profile image */
    .profile-image-wrapper {
      width: 200px;
      height: 260px;
      position: relative;
      overflow: hidden;
      cursor: default;
    }

    .profile-image-main,
    .profile-image-alt {
      width: 100%;
      height: 100%;
      border-radius: 0;
      object-fit: cover;
      object-position: top center;
      position: absolute;
      top: 0;
      left: 0;
      transition: transform 0.4s ease-out, opacity 0.4s ease-out;
    }

    .profile-image-main { transform: translateX(0); opacity: 1; }
    .profile-image-alt  { transform: translateX(100%); opacity: 0; }

    .profile-image-wrapper:hover .profile-image-main {
      transform: translateX(-100%);
      opacity: 0;
    }

    .profile-image-wrapper:hover .profile-image-alt {
      transform: translateX(0);
      opacity: 1;
    }

    /* PGP block */
    .pgp {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .pgp-label {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: #00FF41;
    }

    .pgp-key {
      font-family: "Courier New", monospace;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.45);
      text-decoration: none;
      line-height: 1.9;
      transition: color 0.25s ease;
    }

    .pgp-key:hover { color: rgba(255, 255, 255, 0.9); }

    /* ─── MOBILE ─────────────────────────────── */

    @media (max-width: 768px) {
      body {
        grid-template-columns: 1fr;
        overflow: auto;
        transition: none;
      }

      body:has(.panel-light:hover),
      body:has(.panel-dark:hover) {

      }

      .panel-light {
        min-height: 58vh;
        padding: 3rem 1.75rem 2.5rem;
        justify-content: flex-end;
      }

      /* Remove scanning divider on mobile */
      .panel-light::before { display: none; }

        right: auto;
        bottom: 0;
        top: auto;
        left: 0;
        width: 100%;
        height: 1px;
        background: rgba(0, 0, 0, 0.1);
      }

      .panel-dark {
        min-height: 42vh;
      }

      .dark-content {

        align-items: flex-end;

      }

      }

      }

      .name-rule { margin: 1rem 0; }
      .subtitle  { margin-bottom: 2rem; }

      .nav-links  { max-width: 100%; }

      /* Disable hover effects on touch */

      .profile-image-wrapper:hover .profile-image-alt,
      .headline-email:hover .email-text,
      .headline-email:hover .terminal-box {
        transform: none !important;
        opacity: 1 !important;
      }
    }
  </style>

  <script>
    /* Terminal typing animation on name hover */
    (function () {
      const link = document.querySelector('.headline-email');
      const box  = document.getElementById('terminal-box');
      if (!link || !box) return;

      const lines = [
        '$ connect smtp.sagorski.org',
        '$ sendmail kolja@sagorski.org',
        '$ mail sent ✓'
      ];

      let timeouts = [];

      function clearAllTimeouts() {
        timeouts.forEach(id => clearTimeout(id));
        timeouts = [];
      }

      function startTyping() {
        clearAllTimeouts();
        box.textContent = '';
        box.classList.add('is-typing');

        let fullText = '';
        let delay = 0;
        const charDelay = 40;

        lines.forEach((line, index) => {
          delay += index === 0 ? 0 : 250;

          for (let i = 0; i <= line.length; i++) {
            const currentDelay = delay;
            const part = line.slice(0, i);
            const id = setTimeout(() => { box.textContent = fullText + part; }, currentDelay);
            timeouts.push(id);
            delay += charDelay;
          }

          const finalizeId = setTimeout(() => {
            fullText += line + (index < lines.length - 1 ? '\n' : '');
            box.textContent = fullText;
          }, delay);
          timeouts.push(finalizeId);
        });

        const endId = setTimeout(() => { box.classList.remove('is-typing'); }, delay + 300);
        timeouts.push(endId);
      }

      function resetTyping() {
        clearAllTimeouts();
        box.textContent = '';
        box.classList.remove('is-typing');
      }

      link.addEventListener('mouseenter', startTyping);
      link.addEventListener('mouseleave', resetTyping);
    })();
  </script>
