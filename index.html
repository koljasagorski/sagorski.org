    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr;
      background-color: #FFFFFF;
      font-family: "Source Sans 3", system-ui, sans-serif;

      transition: background 0.4s ease, color 0.4s ease;

    }

    /* DARK MODE VIDEO */
    #dark-video {

      left: 0;

      z-index: -1;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }

    body.dark-mode #dark-video {
      opacity: 1;
    }

    /* LAYOUT */
    .layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      grid-template-rows: 1fr;
      min-height: 100vh;
      border: 4px solid #000;
      box-shadow: 8px 8px 0 #000;
      position: relative;
      z-index: 5;
      transition: border-color 0.4s ease, box-shadow 0.4s ease;
    }

    .text-area {
      padding: 3rem 4rem;
      border-right: 4px solid #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0;
      transition: border-color 0.4s ease;
    }

    /* HEADLINE */
    .headline {
      font-size: clamp(4rem, 9vw, 8rem);
      font-weight: 900;
      text-transform: uppercase;
      line-height: 0.9;
      letter-spacing: -0.02em;
      border-bottom: 4px solid #000;
      padding-bottom: 1rem;
      margin-bottom: 1rem;
      position: relative;
      transition: border-color 0.4s ease;
    }

    .headline:hover {
      text-shadow: 3px 0 0 #FF2D00, -3px 0 0 #000;
    }

    .name-line {
      display: block;
    }

    /* TERMINAL TYPING ANIMATION */
    .headline-email {
      position: relative;
      display: block;
      text-decoration: none;
      color: inherit;
    }

    .email-text {
      display: block;
      transition: 0.25s ease;
    }

    .headline-email:hover .email-text {
      opacity: 0;
      transform: translateY(-14px);
    }

    .terminal-box {
      position: absolute;
      top: calc(100% + 0.75rem);
      left: 0;
      font-family: "Courier New", monospace;
      font-size: 0.8rem;
      color: #000;
      white-space: pre;
      opacity: 0;
      pointer-events: none;
      transition: color 0.3s ease;
      z-index: 10;
    }

    .headline-email:hover .terminal-box {
      opacity: 1;
    }

    .terminal-box.is-typing::after {
      content: "";
      display: inline-block;
      width: 6px;
      height: 1em;
      margin-left: 4px;
      background: #000;
      animation: blink 0.6s infinite;
      vertical-align: bottom;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      50.01%, 100% { opacity: 0; }
    }

    /* EMAIL SYMBOL */
    .email-symbol {
      opacity: 0.5;
      transition: 0.3s;
    }

    /* SUBTITLE */
    .subtitle {
      color: #000;
      font-size: 1.1rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-top: 2px solid #000;
      padding-top: 1rem;
      margin-bottom: 1.5rem;
      transition: color 0.3s, border-color 0.4s ease;
    }

    /* PGP */
    .pgp {
      color: #000;
      font-family: "Courier New", monospace;
      font-size: 0.85rem;
      border-left: 4px solid #FF2D00;
      padding-left: 1rem;
      margin-bottom: 2rem;
      transition: color 0.3s, border-color 0.4s ease;
    }

    .pgp a {

      color: inherit;
      transition: background 0.15s, color 0.15s, padding 0.15s;
    }

    .pgp a:hover {
      background: #000;
      color: #FFFFFF;
      padding: 0 2px;
    }

    /* BUTTON GROUP */
    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1.4rem;
      border-radius: 0;
      border: 3px solid #000;
      text-decoration: none;
      color: #000;
      font-size: 0.85rem;

      text-transform: uppercase;

      opacity: 0;
    }

    .image-panel:hover .profile-image-alt {

  <script>
    /* Terminal typing animation */
    (function () {
      const link = document.querySelector('.headline-email');
      const box = document.getElementById('terminal-box');

      if (!link || !box) return;

      const lines = [
        '$ connect smtp.sagorski.org',
        '$ sendmail kolja@sagorski.org',
        '$ mail sent ✓'
      ];

      let timeouts = [];

      function clearAllTimeouts() {
        timeouts.forEach(id => clearTimeout(id));
        timeouts = [];
      }

      function startTyping() {
        clearAllTimeouts();
        box.textContent = '';
        box.classList.add('is-typing');

        let fullText = '';
        let delay = 0;
        const charDelay = 40;

        lines.forEach((line, index) => {
          delay += index === 0 ? 0 : 250;

          for (let i = 0; i <= line.length; i++) {
            const currentDelay = delay;
            const part = line.slice(0, i);

            const id = setTimeout(() => {
              box.textContent = fullText + part;
            }, currentDelay);

            timeouts.push(id);
            delay += charDelay;
          }

          const finalizeId = setTimeout(() => {
            fullText += line + (index < lines.length - 1 ? '\n' : '');
            box.textContent = fullText;
          }, delay);

          timeouts.push(finalizeId);
        });

        const endId = setTimeout(() => {
          box.classList.remove('is-typing');
        }, delay + 300);

        timeouts.push(endId);
      }

      function resetTyping() {
        clearAllTimeouts();
        box.textContent = '';
        box.classList.remove('is-typing');
      }

      link.addEventListener('mouseenter', startTyping);
      link.addEventListener('mouseleave', resetTyping);
    })();

    /* Dark mode activation on image hover */
    const img = document.getElementById("profile-hover");

    img.addEventListener("mouseenter", () => {
      document.body.classList.add("dark-mode");
    });

    img.addEventListener("mouseleave", () => {
      document.body.classList.remove("dark-mode");
    });
  </script>
